<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股高息股排行</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }
        
        .header-left {
            text-align: left;
        }
        
        .header-right {
            display: flex;
            align-items: flex-start;
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .update-time {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 80px;
        }

        @media (max-width: 600px) {
            .btn {
                padding: 12px 20px;
                font-size: 16px;
                width: 100%;
                min-width: unset;
            }

            .controls {
                justify-content: center;
            }
        }
        
        .btn-primary {
            background: #1890ff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #40a9ff;
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .tables-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        @media (max-width: 1000px) {
            .tables-container {
                grid-template-columns: 1fr;
            }
        }
        
        .table-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .table-header {
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            padding: 18px 20px;
        }
        
        .table-header h2 {
            font-size: 18px;
            font-weight: 500;
        }
        
        .table-header p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #fafafa;
            padding: 12px 15px;
            text-align: left;
            font-weight: 500;
            color: #333;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }
        
        th:nth-child(3),
        td:nth-child(3) {
            min-width: 100px;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 13px;
            color: #333;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .rank {
            font-weight: 600;
            color: #1890ff;
        }
        
        .yield-rate {
            font-weight: 600;
            color: #fa541c;
        }
        
        .yield-rate::after {
            content: "%";
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1890ff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #f5222d;
        }
        
        .info-box {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #333;
        }
        
        .info-box strong {
            color: #1890ff;
        }
        
        .loading-status {
            color: #1890ff;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .btn-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .btn.loading .btn-spinner {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>A股高息股排行</h1>
                <p class="subtitle">仅统计市值大于1000亿的公司</p>
                <p class="update-time" id="updateTime">数据更新时间：--</p>
                <p class="loading-status" id="loadingStatus"></p>
            </div>
            <div class="header-right">
                <button class="btn btn-primary" id="refreshBtn" onclick="loadData()">
                    <span class="btn-spinner" style="display: none;"></span>
                    <span class="btn-text">刷新数据</span>
                </button>
            </div>
        </header>
        
        <div class="tables-container">
            <div class="table-card">
                <div class="table-header">
                    <h2>TTM股息率 TOP 30</h2>
                    <p>最近12个月股息率排名</p>
                </div>
                <div class="table-wrapper">
                    <table id="ttmTable">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>代码</th>
                                <th>名称</th>
                                <th>TTM股息率(%)</th>
                                <th>最新价</th>
                                <th>市值(亿)</th>
                                <th>TTM每股分红</th>
                                <th>分红次数</th>
                            </tr>
                        </thead>
                        <tbody id="ttmBody">
                            <tr><td colspan="8" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="table-card">
                <div class="table-header">
                    <h2>LFY股息率 TOP 30</h2>
                    <p>最近一个财年股息率排名</p>
                </div>
                <div class="table-wrapper">
                    <table id="lfyTable">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>代码</th>
                                <th>名称</th>
                                <th>LFY股息率(%)</th>
                                <th>最新价</th>
                                <th>市值(亿)</th>
                                <th>LFY每股分红</th>
                                <th>分红次数</th>
                            </tr>
                        </thead>
                        <tbody id="lfyBody">
                            <tr><td colspan="8" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="info-box" style="margin-top: 25px; margin-bottom: 0;">
            <strong>说明：</strong>派息时间以公告日期为准统计，根据实际分红金额计算。
            TTM股息率使用最近12个月分红总和，LFY股息率使用最近一个财年分红数据。
        </div>
    </div>
    
    <script>
        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            const spinner = btn.querySelector('.btn-spinner');
            const btnText = btn.querySelector('.btn-text');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = '加载中...';
            
            document.getElementById('ttmBody').innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
            document.getElementById('lfyBody').innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
            document.getElementById('loadingStatus').textContent = '数据正在加载中，请稍候...';
            
            try {
                const response = await fetch('/data.json', {
                    cache: 'no-cache'
                });
                const data = await response.json();
                
                if (data.ttm && data.ttm.length > 0) {
                    renderTable('ttmBody', data.ttm, 'ttm_yield', 'ttm_dividend', 'ttm_dividend_count');
                }
                if (data.lfy && data.lfy.length > 0) {
                    renderTable('lfyBody', data.lfy, 'lfy_yield', 'lfy_dividend', 'lfy_dividend_count');
                }
                if (data.ttm && data.ttm.length > 0 || data.lfy && data.lfy.length > 0) {
                    document.getElementById('updateTime').textContent = 
                        `数据更新时间：${data.update_time}`;
                }
                
                document.getElementById('loadingStatus').textContent = '';
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = '刷新数据';
            } catch (e) {
                showError('数据加载失败，请稍后重试');
            }
        }
        
        function renderTable(tbodyId, data, yieldField, dividendField, countField) {
            const tbody = document.getElementById(tbodyId);
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td class="rank">${index + 1}</td>
                    <td>${item.code}</td>
                    <td>${item.name}</td>
                    <td class="yield-rate">${item[yieldField].toFixed(2)}</td>
                    <td>${item.price.toFixed(2)}</td>
                    <td>${Math.round(item.market_cap)}</td>
                    <td>${item[dividendField].toFixed(4)}</td>
                    <td>${item[countField] || 0}</td>
                </tr>
            `).join('');
        }
        
        function showError(message) {
            document.getElementById('ttmBody').innerHTML = 
                `<tr><td colspan="8" class="error">${message}</td></tr>`;
            document.getElementById('lfyBody').innerHTML = 
                `<tr><td colspan="8" class="error">${message}</td></tr>`;
            document.getElementById('loadingStatus').textContent = '';
            
            const btn = document.getElementById('refreshBtn');
            const spinner = btn.querySelector('.btn-spinner');
            const btnText = btn.querySelector('.btn-text');
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = '刷新数据';
        }
        
        loadData();
    </script>
</body>
</html>
